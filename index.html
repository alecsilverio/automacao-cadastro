<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Cadastro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Sistema de Cadastro</h1>
      <p>Cadastro simples com HTML, CSS e JavaScript, pronto para GitHub Pages.</p>
      <div class="aviso">
        Os dados ficam salvos no navegador usando <strong>localStorage</strong>.
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Formulário</h2>

        <form id="formCadastro">
          <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome" required />
          </div>

          <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite o e-mail" required />
          </div>

          <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(67) 99999-9999" required />
          </div>

          <div class="acoes">
            <button type="submit" class="btn-primary" id="btnSalvar">Cadastrar</button>
            <button type="button" class="btn-secondary" id="btnLimpar">Limpar</button>
            <button type="button" class="btn-success" id="btnExportar">Exportar JSON</button>
          </div>
        </form>

        <div id="status" class="status"></div>

        <div class="info-box">
          Chave de armazenamento: <code>cadastros-simples-github</code>.
        </div>
      </article>

      <article class="card">
        <h2>Cadastros salvos</h2>
        <div id="lista" class="lista"></div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
